# ==========================================
# About / LABO理念
# ==========================================
about.story.title=なぜツールを無料提供するのか
about.story.p1=ASTROが提供する短期特化の取引環境を攻略するには、勝率をデータで確認できる環境が不可欠です。私たちは、感覚ではなく「根拠」に基づいて取引をしてほしいという想いから、このサイン検証システムを開発しました。
about.story.p2=より多くの人にツールを使って検証していただくため、当サイトの紹介リンクを通じて登録していただいた方に、全機能を開放するという形でツールを提供しています。
about.story.p3=紹介リンク経由でのご登録が私たち運営への応援となり、ツールの維持やさらなる機能アップデートに繋がっています。

