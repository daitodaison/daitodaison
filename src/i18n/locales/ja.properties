# ベントグリッド
bento.title=<span class="text-primary">限定ツールの機能</span>と登録のメリット
bento.description=指定リンクからASTROに登録し、IDを申請するだけで、強力な取引サポートツールが完全無料で使えます。
bento.item1.title=ハイローIDでそのままログイン
bento.item1.desc=旧ハイローのメアド＋パスワードでログイン可能。ただし出金時には本人確認書類の再提出が必要な場合があります。
bento.item2.title=ドロー救済（引き分け払い戻し）
bento.item2.desc=同値判定（ドロー）時は負けではなく「払い戻し」となる、旧ハイローにはなかったユーザー救済仕様。
bento.item3.title=最短15秒の高速短期取引
bento.item3.desc=15秒、30秒、1分、3分、5分の短期に特化。15〜30ミリ秒の高速約定で狙った瞬間を逃しません。
bento.item4.title=ツール完全版が無料（要ID確認）
bento.item4.desc=指定リンクから登録された方に、すべての通貨ペアとインジケーター、過去勝率シミュレーション機能を開放します。
bento.item5.title=少額1,000円から取引可能
bento.item5.desc=最低取引額は1,000円、1回の上限は20万円。デモ口座は登録不要・完全無料で利用できます。

