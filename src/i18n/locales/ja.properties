# ベネフィットセクション
benefits.title=限定ツール完全版を手に入れる3ステップ
benefits.subtitle=簡単な手順を踏むだけで、本来有料級のサイン検証シミュレーターを永年無料でご利用いただけます。
benefits.1.title=【STEP 1】指定リンクから登録
benefits.1.desc=当サイトに設置されている公式ボタン・リンクからASTROにログインまたは新規登録を行います。
benefits.2.title=【STEP 2】取引IDを申請
benefits.2.desc=ASTROの登録完了後、マイページ等で確認できる「お客様ID（口座ID）」を、当サイトの申請フォームから送信してください。
benefits.3.title=【STEP 3】ツール完全版を解放
benefits.3.desc=管理画面にてお客様のIDが当サイト経由であると確認でき次第、ツールの制限を解除する専用パスワードを送付いたします。
benefits.4.title=感覚に頼らない「数値データ」
benefits.4.desc=各種インジケーターの過去勝率をリアルタイムでシミュレート。勝てる局面だけを論理的に見抜くことができます。
benefits.5.title=登録不要の公式デモも検証可能
benefits.5.desc=ツールを使ってシグナルを確認しながら、ASTRO公式の無料デモ口座でリスクなく練習・検証が可能です。
benefits.6.title=スマホ・PCどちらでも快適動作
benefits.6.desc=専用アプリのインストールは不要。ブラウザだけで快適にサインシグナルの確認とバックテストが行えます。

