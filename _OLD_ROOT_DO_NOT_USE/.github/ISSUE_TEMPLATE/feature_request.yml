name: "🚀 Feature Request"
description: Suggest an idea or new component for Cooper.
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make Cooper even better? We'd love to hear it!
  - type: dropdown
    id: is_related_to_problem
    attributes:
      label: Is your feature request related to a problem?
      description: Select "Yes" if this feature is intended to solve a current pain point or limitation.
      options:
        - "No (New Idea / Enhancement)"
        - "Yes (Existing pain point / Limitation)"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Context
      description: |
        **SPECIAL INSTRUCTION:** If you selected **YES** above, please explain the limitation or frustration clearly. 
        If this is a technical failure, consider using the [Bug Report template](https://github.com/GladTek/Cooper/issues/new?template=bug_report.yml) instead.
      placeholder: |
        If "Yes": Describe the pain point...
        If "No": Explain what prompted this new idea...
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched for similar feature requests.
          required: true
        - label: This feature would benefit a majority of Cooper users.
          required: true
