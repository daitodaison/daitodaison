faq.default.title=Frequently Asked Questions
faq.default.subtitle=We answer common questions about ASTRO and the exclusive sign tool.
faq.home.1.q=Does the full version cost money?
faq.home.1.a=No, it is completely free. If you register with ASTRO through our designated link (or transfer your account) and your account ID is confirmed, we will provide the unlock password permanently free of charge.
faq.home.2.q=Why do you need to verify registration (account ID)?
faq.home.2.a=To protect the tool from misuse and unauthorized distribution, and to safely offer the special benefit only to users who registered through our referral link.
faq.home.3.q=If I transfer my account from Highlow, am I still eligible?
faq.home.3.a=Yes. If you move to ASTRO through our referral link and log in or link with your existing Highlow ID, you are eligible. Please submit the ID shown after login.
faq.home.4.q=How long does it take from ID application to tool unlock?
faq.home.4.a=Usually within 24 to 48 hours after submitting the application form, we complete verification and send the unlock email.
faq.home.5.q=Is this site an affiliate site?
faq.home.5.a=Yes, this site is an affiliate blog that provides ASTRO information. Content is based on the official ASTRO site (astro.space), but this is not investment advice.

