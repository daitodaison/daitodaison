about.feat.fast.desc=デフォルトでゼロJS、アイランドアーキテクチャ採用で高速表示に最適化。
about.feat.responsive=完全レスポンシブ
about.feat.responsive.desc=スマホから4Kデスクトップまで、どんな画面でも美しく表示。
about.feat.secure=セキュア設計
about.feat.secure.desc=最新のセキュリティ基準とベストプラクティスを考慮して構築。
about.feat.seo=SEO最適化
