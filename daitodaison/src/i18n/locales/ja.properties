# ==========================================
# FAQ
# ==========================================
faq.default.title=よくある質問（FAQ）
faq.default.subtitle=ASTROや限定サインツールに関する、よくあるご質問にお答えします。
faq.home.1.q=ツール完全版を使うのにお金はかかりますか？
faq.home.1.a=いいえ、完全無料です。当サイトの指定リンクからASTROに登録（または引き継ぎ）していただき、口座IDが確認できれば、制限解除用のパスワードを永年無料でお渡しします。
faq.home.2.q=なぜ登録（口座ID）の確認が必要なのですか？
faq.home.2.a=開発コストのかかっているツールを悪用や無断転載から守り、当サイトの紹介経由で登録されたユーザー様にのみ特別な特典として安全に還元するためです。何卒ご理解ください。
faq.home.3.q=ハイローからアカウントを引き継いだ場合でも対象になりますか？
faq.home.3.a=はい。当サイトの紹介リンクからASTROに遷移し、お手持ちの旧ハイローIDでログイン・連携を行っていただければ、同様に対象となります。ログイン後の画面に表示されるIDを申請してください。
faq.home.4.q=IDの申請からツール解放までどのくらい時間がかかりますか？
faq.home.4.a=通常、申請フォームの送信から24時間〜48時間以内に、管理画面で照合を完了し、折り返しツールの制限解除用メールをお送りいたします。
faq.home.5.q=このサイトはアフィリエイトサイトですか？
faq.home.5.a=はい、本サイトはASTROの情報提供を目的としたアフィリエイトブログです。掲載情報は公式サイト（astro.space）をもとに作成していますが、投資を推奨するものではありません。

