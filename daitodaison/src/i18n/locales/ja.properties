# ==========================================
# FAQ pricing
# ==========================================
faq.pricing.1.q=本当に無料ですか？
faq.pricing.1.a=はい、指定の口座ID確認ができれば、ツールの利用料や課金は一切発生しません。
faq.pricing.2.q=口座IDを送信してからどのくらいで完全版が使えますか？
faq.pricing.2.a=通常24時間〜48時間以内にIDを照合し、制限解除キーを送付します。
faq.pricing.3.q=引き継ぎアカウントでも完全版ツールの対象になりますか？
faq.pricing.3.a=はい、当サイトのリンク経由でASTROに遷移し、旧ハイロー情報でログイン・ID連携を完了していただければ対象となります。
faq.pricing.4.q=完全版ツールの利用条件は何ですか？
faq.pricing.4.a=ASTROへの登録と申請フォームでの口座ID送信後、管理画面で本人確認が取れれば完全版が解放されます。

